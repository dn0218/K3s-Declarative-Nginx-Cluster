apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: default
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;
    events {
        worker_connections  1024;
    }
    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        keepalive_timeout  65;
        server {
            listen       80;
            server_name  localhost;
            location / {
                root   /usr/share/nginx/html;
                index  index.html index.htm;
            }
        }
    }
  index.html: |
    <html>
    <body style="background-color: #2c3e50; color: #ecf0f1; font-family: sans-serif; text-align: center;">
        <h1>K3s 高可用 Nginx 集群</h1>
        <p>部署时间: 2026-04-22</p>
        <p>节点安全状态: SELinux Enforcing</p>
        <hr>
        <div id="footer">通过 ConfigMap 动态注入</div>
    </body>
    </html>
